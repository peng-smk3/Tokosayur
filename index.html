<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Toko Sayur PRO++</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<style>
body {font-family: Arial; margin:0;}
header {background: green; color:white; padding:15px; text-align:center;}
section {padding:20px;}
.produk {
  border:1px solid #ccc; 
  padding:10px; 
  margin:10px; 
  display:inline-block; 
  width:200px;
}
.produk img {
  width:100%;
  height:150px;
  object-fit:cover;
}
button {
  background:green; 
  color:white; 
  border:none; 
  padding:10px; 
  cursor:pointer; 
  margin-top:5px;
}
input {
  padding:5px; 
  margin:5px; 
  width:90%;
}
.admin {
  background:#f4f4f4; 
  padding:15px; 
  display:none;
}
</style>
</head>

<body>

<header>
<h1>🥬 Toko Sayur Mojoduwur</h1>
<p>Order Mudah via WhatsApp + GPS</p>
</header>

<section>
<h2>Produk</h2>
<div id="produk"></div>
</section>

<section>
<h2>Checkout</h2>
<input id="nama" placeholder="Nama">
<input id="alamat" placeholder="Alamat">
<input id="jarak" type="number" placeholder="Jarak (km)">
<br>
<button onclick="ambilLokasi()">📍 Ambil Lokasi Otomatis</button>
<button onclick="checkout()">Checkout WhatsApp</button>
<button onclick="bukaMaps()">🗺️ Lihat Lokasi Toko</button>
</section>

<section>
<h2>Login Admin</h2>
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</section>

<section id="admin" class="admin">
<h2>Panel Admin</h2>
<div id="admin-list"></div>
<button onclick="tambahProduk()">+ Tambah Produk</button>
</section>

<script>
// 🔥 ISI FIREBASE CONFIG KAMU DI SINI
const firebaseConfig = {
  apiKey: "ISI_API_KEY",
  authDomain: "ISI_DOMAIN",
  databaseURL: "ISI_DATABASE_URL",
  projectId: "ISI_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let keranjang = [];

// 📍 Koordinat toko (perkiraan Mojoduwur)
const tokoLat = -7.563;
const tokoLng = 112.406;

// LOAD PRODUK
function loadProduk(){
  db.ref('produk').on('value', snap=>{
    let data = snap.val();
    let html='';
    let adminHTML='';

    for(let id in data){
      let p = data[id];

      html += `
      <div class="produk">
        <img src="${p.foto}">
        <h3>${p.nama}</h3>
        <p>Rp ${p.harga}</p>
        <button onclick="tambah('${id}','${p.nama}',${p.harga})">Tambah</button>
      </div>`;

      adminHTML += `
        <p>${p.nama}</p>
        <input id="h-${id}" value="${p.harga}">
        <button onclick="update('${id}')">Update</button>
        <hr>`;
    }

    document.getElementById('produk').innerHTML = html;
    document.getElementById('admin-list').innerHTML = adminHTML;
  });
}

// TAMBAH KE KERANJANG
function tambah(id,nama,harga){
  keranjang.push({nama,harga});
  alert('Ditambahkan ke keranjang');
}

// GPS USER
function ambilLokasi(){
  navigator.geolocation.getCurrentPosition(pos=>{
    let userLat = pos.coords.latitude;
    let userLng = pos.coords.longitude;

    let jarak = hitungJarak(userLat, userLng, tokoLat, tokoLng);
    document.getElementById('jarak').value = jarak.toFixed(1);
  });
}

// HITUNG JARAK
function hitungJarak(lat1, lon1, lat2, lon2){
  let R = 6371;
  let dLat = (lat2-lat1) * Math.PI/180;
  let dLon = (lon2-lon1) * Math.PI/180;

  let a = Math.sin(dLat/2)**2 +
          Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180) *
          Math.sin(dLon/2)**2;

  let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

// CHECKOUT WA
function checkout(){
  let nama = document.getElementById('nama').value;
  let alamat = document.getElementById('alamat').value;
  let jarak = document.getElementById('jarak').value;

  let total=0;
  let list='';

  keranjang.forEach(p=>{
    total += p.harga;
    list += p.nama + ', ';
  });

  let ongkir = jarak ? jarak*500 : 0;
  total += ongkir;

  // simpan ke database
  db.ref('pesanan').push({nama,alamat,list,total,ongkir});

  let teks = `Halo, saya pesan:%0A${nama}%0A${alamat}%0AProduk: ${list}%0AOngkir: ${ongkir}%0ATotal: ${total}`;

  window.open('https://wa.me/6285706774118?text='+teks);
}

// MAPS TOKO
function bukaMaps(){
  window.open('https://maps.app.goo.gl/o7r1D3s9ks6vxfxW6');
}

// LOGIN ADMIN
function login(){
  if(document.getElementById('pass').value==='admin123'){
    document.getElementById('admin').style.display='block';
  } else {
    alert('Password salah');
  }
}

// UPDATE HARGA
function update(id){
  let val = document.getElementById('h-'+id).value;
  db.ref('produk/'+id).update({harga:parseInt(val)});
}

// TAMBAH PRODUK
function tambahProduk(){
  let nama = prompt('Nama produk');
  let harga = prompt('Harga');
  let foto = prompt('Link foto (URL)');

  db.ref('produk').push({
    nama,
    harga: parseInt(harga),
    foto
  });
}

loadProduk();
</script>

</body>
</html>
